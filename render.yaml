services:
  - type: web
    name: ai-resume-intelligence-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-resume-intelligence-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-resume-intelligence-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
  - type: redis
    name: ai-resume-intelligence-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: public access (can be restricted later)

databases:
  - name: ai-resume-intelligence-db
    databaseName: talent_intel
    user: talent_intel_user
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: public access (can be restricted later)
